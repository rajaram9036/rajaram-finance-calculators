<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Income Tax Calculator | Rajaram Finance Calculators</title>

<meta name="description" content="Free Income Tax Calculator for India">

</head>

<body>

<header class="header">

<div class="logo">
🧾 Income Tax Calculator
</div>

<nav>

<a href="index.html">🏠 Home</a>

</nav>

</header>

<section class="hero">

<h1>🧾 Income Tax Calculator</h1>

<p>Estimate your Income Tax instantly.</p>

</section>

<section class="calculator">

<div class="calculator-box">

<h2>Calculate Income Tax</h2>

<label>Annual Income (₹)</label>

<input
type="number"
id="income"
placeholder="Enter Annual Income">

<label>Total Deductions (₹)</label>

<input
type="number"
id="deduction"
placeholder="Enter Deductions">

<label>Tax Regime</label>

<select id="regime">

<option value="new">New Tax Regime</option>

<option value="old">Old Tax Regime</option>

</select>

<button onclick="calculateTax()">

Calculate Tax

</button>

<button onclick="resetForm()">

Reset

</button>

<div class="result-box">

<h3>Your Result</h3>

<p><strong>Taxable Income:</strong> <span id="taxable">₹0</span></p>

<p><strong>Estimated Tax:</strong> <span id="tax">₹0</span></p>

<p><strong>Effective Tax Rate:</strong> <span id="rate">0%</span></p>

</div>

</div>

</section>

<script>
  function calculateTax() {

let income = Number(document.getElementById("income").value);
let deduction = Number(document.getElementById("deduction").value);
let regime = document.getElementById("regime").value;

if (income <= 0) {
alert("Please enter Annual Income");
return;
}

let taxable = income;

if (regime == "old") {
taxable = income - deduction;

if (taxable < 0) {
taxable = 0;
}
}

let tax = 0;

if (taxable <= 400000) {

tax = 0;

}

else if (taxable <= 800000) {

tax = (taxable - 400000) * 0.05;

}

else if (taxable <= 1200000) {

tax = 20000 + (taxable - 800000) * 0.10;

}

else if (taxable <= 1600000) {

tax = 60000 + (taxable - 1200000) * 0.15;

}

else if (taxable <= 2000000) {

tax = 120000 + (taxable - 1600000) * 0.20;

}

else if (taxable <= 2400000) {

tax = 200000 + (taxable - 2000000) * 0.25;

}

else {

tax = 300000 + (taxable - 2400000) * 0.30;

}

let rate = ((tax / income) * 100).toFixed(2);

document.getElementById("taxable").innerHTML =
"₹" + taxable.toLocaleString("en-IN");

document.getElementById("tax").innerHTML =
"₹" + tax.toLocaleString("en-IN");

document.getElementById("rate").innerHTML =
rate + "%";

}

function resetForm(){

document.getElementById("income").value="";

document.getElementById("deduction").value="";

document.getElementById("regime").selectedIndex=0;

document.getElementById("taxable").innerHTML="₹0";

document.getElementById("tax").innerHTML="₹0";

document.getElementById("rate").innerHTML="0%";

}

</script>
