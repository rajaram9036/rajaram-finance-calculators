<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator | Rajaram Finance Calculators</title>

<link rel="stylesheet" href="calculator.css">

</head>

<body>

<div class="calculator">

<div class="screen">

<input
type="text"
id="display"
readonly
placeholder="0">

</div>

<div class="keys">

<button class="gray" onclick="clearDisplay()">AC</button>
<button class="gray" onclick="backspace()">⌫</button>
<button class="blue" onclick="press('%')">%</button>
<button class="blue" onclick="press('/')">÷</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="blue" onclick="press('*')">×</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="blue" onclick="press('-')">−</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="blue" onclick="press('+')">+</button>

<button onclick="press('00')">00</button>
<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script src="calculator.js"></script>

</body>
</html>
