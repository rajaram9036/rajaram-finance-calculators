<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator</title>

<link rel="stylesheet" href="style.css">

<style>
.box{
max-width:600px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.box h1{
text-align:center;
color:#1565C0;
}

.box input{
width:100%;
padding:15px;
margin:10px 0 20px;
font-size:18px;
}

.box button{
width:100%;
padding:15px;
background:#1565C0;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
}

#result{
margin-top:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:green;
}
</style>

</head>

<body>

<div class="box">

<h1>🧾 GST Calculator</h1>

<label>Amount (₹)</label>

<input type="number" id="amount" value="1000">

<label>GST %</label>

<input type="number" id="gst" value="18">

<button onclick="gstCalc()">Calculate GST</button>

<div id="result"></div>

</div>

<script>

function gstCalc(){

let amount=parseFloat(document.getElementById("amount").value);

let gst=parseFloat(document.getElementById("gst").value);

let gstAmount=(amount*gst)/100;

let total=amount+gstAmount;

document.getElementById("result").innerHTML=
"GST : ₹"+gstAmount.toFixed(2)+"<br>Total : ₹"+total.toFixed(2);

}

</script>

</body>
</html>
