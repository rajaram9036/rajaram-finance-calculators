<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#0d6efd;
margin-bottom:25px;
font-size:36px;
}

label{
display:block;
margin-top:18px;
font-size:18px;
font-weight:bold;
}

input{
width:100%;
padding:16px;
font-size:18px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
outline:none;
}

input:focus{
border-color:#1976D2;
}

button{
width:100%;
padding:15px;
margin-top:18px;
background:#1976D2;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1259a8;
}

.result{
display:none;
margin-top:20px;
background:#eefcf0;
border:1px solid #c8e6c9;
padding:18px;
border-radius:12px;
}

.result p{
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.green{
color:green;
}

canvas{
max-width:300px;
margin:20px auto;
display:block;
}

@media(max-width:600px){

.container{
padding:18px;
}

h1{
font-size:30px;
}

input,
button{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>💰 SIP Calculator</h1>
<label>Monthly Investment (₹)</label>
<input type="number" id="amount" placeholder="2000">

<label>Annual Return (%)</label>
<input type="number" id="rate" placeholder="12">

<label>Time (Years)</label>
<input type="number" id="years" placeholder="10">

<button onclick="calculateSIP()">📱 Calculate SIP</button>

<div class="result" id="result">

<p>Total Invested:
<br>
<span class="green" id="invested">₹0</span>
</p>

<p>Wealth Gain:
<br>
<span class="green" id="gain">₹0</span>
</p>

<p>Estimated Value:
<br>
<span class="green" id="value">₹0</span>
</p>

<canvas id="sipChart" height="250"></canvas>

<button onclick="resetSIP()">🔄 Reset</button>

<a href="index.html">
<button type="button">🏠 Back to Home</button>
</a>

</div>

<script>

let chart;

function calculateSIP(){
  let P = parseFloat(document.getElementById("amount").value);
let annual = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);

if (isNaN(P) || isNaN(annual) || isNaN(years)) {
    alert("Please fill all fields");
    return;
}

let r = annual / 12 / 100;
let n = years * 12;

let futureValue = P * (((Math.pow(1 + r, n)) - 1) * (1 + r)) / r;
let invested = P * n;
let gain = futureValue - invested;

document.getElementById("invested").innerHTML =
"₹" + Number(invested.toFixed(0)).toLocaleString("en-IN");

document.getElementById("gain").innerHTML =
"₹" + Number(gain.toFixed(0)).toLocaleString("en-IN");

document.getElementById("value").innerHTML =
"₹" + Number(futureValue.toFixed(0)).toLocaleString("en-IN");

document.getElementById("result").style.display = "block";

if (chart) {
    chart.destroy();
}

const ctx = document.getElementById("sipChart").getContext("2d");

chart = new Chart(ctx, {
    type: "doughnut",
    data: {
        labels: ["Total Invested", "Wealth Gain"],
        datasets: [{
            data: [invested, gain],
            backgroundColor: ["#1976D2", "#4CAF50"]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                position: "bottom"
            }
        }
    }
});

}
  function resetSIP(){

document.getElementById("amount").value="";
document.getElementById("rate").value="";
document.getElementById("years").value="";

document.getElementById("invested").innerHTML="₹0";
document.getElementById("gain").innerHTML="₹0";
document.getElementById("value").innerHTML="₹0";

document.getElementById("result").style.display="none";

if(chart){
chart.destroy();
chart=null;
}

}

</script>

</div>

</body>
</html>
