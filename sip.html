<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP Calculator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#1565C0;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
}

button{
width:100%;
padding:12px;
background:#1565C0;
color:#fff;
font-size:18px;
border:none;
border-radius:6px;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
color:green;
}
</style>

</head>

<body>

<div class="container">

<h1>💰 SIP Calculator</h1>

<label>Monthly Investment (₹)</label>
<input type="number" id="sipAmount">

<label>Annual Return (%)</label>
<input type="number" id="sipRate">

<label>Time (Years)</label>
<input type="number" id="sipYears">

<button onclick="calculateSIP()">Calculate SIP</button>

<div id="result"></div>

</div>

<script>

function calculateSIP(){

let P=parseFloat(document.getElementById("sipAmount").value);

let annualRate=parseFloat(document.getElementById("sipRate").value);

let years=parseFloat(document.getElementById("sipYears").value);

let r=annualRate/12/100;

let n=years*12;

let M=P*(((Math.pow(1+r,n)-1)/r)*(1+r));

document.getElementById("result").innerHTML="Estimated Value : ₹"+M.toFixed(0);

}

</script>

</body>
</html>
