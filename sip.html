<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP Calculator</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
background:#eef3fb;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:25px auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#0d6efd;
font-size:42px;
margin-bottom:25px;
}

label{
display:block;
font-size:22px;
font-weight:bold;
margin-top:18px;
}

input{
width:100%;
padding:18px;
font-size:28px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
margin-top:8px;
}

button{
width:100%;
padding:18px;
margin-top:25px;
font-size:28px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

.result{
margin-top:25px;
background:#f3fff4;
border:2px solid #c8f0cd;
border-radius:12px;
padding:20px;
display:none;
}

.result p{
font-size:24px;
margin:12px 0;
font-weight:bold;
}

.green{
color:green;
}

</style>
</head>

<body>

<div class="container">

<h1>💰 SIP Calculator</h1>
<label>Monthly Investment (₹)</label>
<input type="number" id="amount" placeholder="2000">

<label>Annual Return (%)</label>
<input type="number" id="rate" placeholder="12">

<label>Time (Years)</label>
<input type="number" id="years" placeholder="10">

<button onclick="calculateSIP()">📱 Calculate SIP</button>

<div class="result" id="result">

<p>Total Invested:
<span class="green" id="invested">₹0</span>
</p>

<p>Wealth Gain:
<span class="green" id="gain">₹0</span>
</p>

<p>Estimated Value:
<span class="green" id="value">₹0</span>
</p>

</div>
<script>
function calculateSIP(){

let P = parseFloat(document.getElementById("amount").value);
let annual = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);

if(isNaN(P) || isNaN(annual) || isNaN(years)){
alert("Please fill all fields");
return;
}

let r = annual / 12 / 100;
let n = years * 12;

let futureValue = P * (((Math.pow(1+r,n))-1) * (1+r)) / r;
let invested = P * n;
let gain = futureValue - invested;

document.getElementById("invested").innerHTML =
"₹" + invested.toFixed(0);

document.getElementById("gain").innerHTML =
"₹" + gain.toFixed(0);

document.getElementById("value").innerHTML =
"₹" + futureValue.toFixed(0);

document.getElementById("result").style.display="block";

}
</script>

</div>

</body>
</html>
