<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
padding:20px;
background:#eef3fb;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#0d6efd;
font-size:42px;
margin-bottom:25px;
}

label{
display:block;
font-size:22px;
font-weight:bold;
margin-top:18px;
}

input{
width:100%;
padding:18px;
font-size:28px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
margin-top:8px;
}

button{
width:100%;
padding:18px;
margin-top:25px;
font-size:28px;
background:#0d6efd;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#0b5ed7;
}

.result{
display:none;
margin-top:25px;
background:#f3fff4;
border:2px solid #c8f0cd;
border-radius:12px;
padding:20px;
}

.result p{
font-size:24px;
font-weight:bold;
margin:12px 0;
}

.green{
color:green;
}

#sipChart{
display:block;
width:280px !important;
height:280px !important;
margin:20px auto;
}
.action-buttons{
display:flex;
flex-direction:column;
gap:12px;
margin:20px 0;
}

.action-buttons button{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
background:#1976D2;
color:#fff;
cursor:pointer;
transition:.3s;
}

.action-buttons button:hover{
background:#1259a8;
}
  .action-buttons{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.action-buttons button{
width:100%;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
background:#1976D2;
color:#fff;
cursor:pointer;
transition:.3s;
}

.action-buttons button:hover{
background:#1259a8;
}

#yearlyTable{
margin-top:25px;
overflow-x:auto;
}

#yearlyTable table{
width:100%;
border-collapse:collapse;
font-size:16px;
}

#yearlyTable th{
background:#1976D2;
color:#fff;
padding:10px;
}

#yearlyTable td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

canvas{
max-width:320px;
max-height:320px;
margin:20px auto;
display:block;
}

@media(max-width:600px){
.container{
padding:18px;
}

h1{
font-size:34px;
}

input,
select,
button{
font-size:18px;
}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">

<h1>💰 SIP Calculator</h1>
<label>Monthly Investment (₹)</label>
<input type="number" id="amount" placeholder="2000">

<label>Annual Return (%)</label>
<input type="number" id="rate" placeholder="12">

<label>Time (Years)</label>
<input type="number" id="years" placeholder="10">

<button onclick="calculateSIP()">📱 Calculate SIP</button>

<div class="result" id="result">

<p>Total Invested:
<span class="green" id="invested">₹0</span>
</p>

<p>Wealth Gain:
<span class="green" id="gain">₹0</span>
</p>

<p>Estimated Value:
<span class="green" id="value">₹0</span>
</p>

<canvas id="sipChart" height="250" style="margin-top:20px;"></canvas>

</div>
  <div id="yearlyTable" style="margin-top:20px;overflow-x:auto;"></div>
<div class="action-buttons">

<button onclick="downloadPDF()">📄 Download PDF</button>

<button onclick="shareResult()">📤 Share Result</button>

<button onclick="copyResult()">📋 Copy Result</button>

</div>
  
<button onclick="resetSIP()">🔄 Reset</button>

<a href="index.html">
<button>🏠 Back to Home</button>
</a>

<script>

let chart;

function calculateSIP(){
  let P = parseFloat(document.getElementById("amount").value);
let annual = parseFloat(document.getElementById("rate").value);
let years = parseFloat(document.getElementById("years").value);

if (isNaN(P) || isNaN(annual) || isNaN(years)) {
    alert("Please fill all fields");
    return;
}

let r = annual / 12 / 100;
let n = years * 12;

let futureValue = P * (((Math.pow(1 + r, n)) - 1) * (1 + r)) / r;
let invested = P * n;
let gain = futureValue - invested;

document.getElementById("invested").innerHTML =
"₹" + Number(invested.toFixed(0)).toLocaleString("en-IN");
document.getElementById("gain").innerHTML =
"₹" + Number(gain.toFixed(0)).toLocaleString("en-IN");
document.getElementById("value").innerHTML =
"₹" + Number(futureValue.toFixed(0)).toLocaleString("en-IN");

document.getElementById("result").style.display = "block";
  if (chart) {
    chart.destroy();
}

let ctx = document.getElementById("sipChart").getContext("2d");

chart = new Chart(ctx, {
    type: "doughnut",
    data: {
        labels: ["Total Invested", "Wealth Gain"],
        datasets: [{
            data: [invested, gain],
            backgroundColor: [
                "#1976D2",
                "#4CAF50"
            ],
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
    legend: {
        position: "bottom"
    },
    tooltip: {
        enabled: true
    }
        }
    }
});

let table = `<h3>📊 Yearly Growth Table</h3>
<table border="1" width="100%">
<tr>
<th>Year</th>
<th>Invested</th>
<th>Estimated Value</th>
<th>Gain</th>
</tr>`;

for(let y=1; y<=years; y++){

let months=y*12;
let fv=P*(((Math.pow(1+r,months))-1)*(1+r))/r;
let inv=P*months;
let g=fv-inv;

table+=`
<tr>
<td>${y}</td>
<td>₹${Number(inv.toFixed(0)).toLocaleString("en-IN")}</td>
<td>₹${Number(fv.toFixed(0)).toLocaleString("en-IN")}</td>
<td>₹${Number(g.toFixed(0)).toLocaleString("en-IN")}</td>
</tr>`;
}

table+="</table>";

document.getElementById("yearlyTable").innerHTML=table;  

}
  function resetSIP(){

document.getElementById("amount").value="";
document.getElementById("rate").value="";
document.getElementById("years").value="";

document.getElementById("invested").innerHTML="₹0";
document.getElementById("gain").innerHTML="₹0";
document.getElementById("value").innerHTML="₹0";

document.getElementById("result").style.display="none";

if(chart){
chart.destroy();
chart=null;
}

}
function copyResult(){

let text =
"Total Invested: " + document.getElementById("invested").innerText +
"\nWealth Gain: " + document.getElementById("gain").innerText +
"\nEstimated Value: " + document.getElementById("value").innerText;

navigator.clipboard.writeText(text);

alert("Result Copied Successfully");
}

function shareResult(){

let text =
"Total Invested: " + document.getElementById("invested").innerText +
"\nWealth Gain: " + document.getElementById("gain").innerText +
"\nEstimated Value: " + document.getElementById("value").innerText;

if(navigator.share){
navigator.share({
title:"SIP Calculator",
text:text
});
}else{
alert("Sharing not supported on this device");
}
}

function downloadPDF() {
  const element = document.querySelector(".container");

  html2pdf()
    .set({
      margin: 10,
      filename: "SIP-Calculator-Result.pdf",
      image: { type: "jpeg", quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    })
    .from(element)
    .save();
}
</script>

</div>

</body>
</html>
